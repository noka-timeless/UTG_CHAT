recipe: default.v1

assistant_id: 20260510-163233-gray-agent

language: en

pipeline:

  - name: WhitespaceTokenizer

  - name: RegexFeaturizer

  - name: LexicalSyntacticFeaturizer

  - name: CountVectorsFeaturizer

  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 5

  - name: DIETClassifier
    epochs: 100
    learning_rate: 0.001
    constrain_similarities: true

  - name: EntitySynonymMapper

  - name: ResponseSelector
    epochs: 100
    constrain_similarities: true

  - name: FallbackClassifier
    threshold: 0.30
    ambiguity_threshold: 0.10


policies:

  - name: RulePolicy
    core_fallback_threshold: 0.30
    core_fallback_action_name: "utter_default"
    enable_fallback_prediction: true

  - name: MemoizationPolicy
    max_history: 5

  - name: TEDPolicy
    max_history: 10
    epochs: 100
    constrain_similarities: true
    learning_rate: 0.001

  - name: UnexpecTEDIntentPolicy
    max_history: 5
    epochs: 50
    learning_rate: 0.001
